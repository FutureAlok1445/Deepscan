version: "3.8"
services:
  backend:
    build: ./backend
    ports: [ "8000:8000" ]
    env_file: .env
    depends_on: [ mongo, redis ]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - deepscan-net

  frontend:
    build: ./frontend
    ports: [ "80:80" ]
    depends_on: [ backend ]
    restart: unless-stopped
    networks:
      - deepscan-net

  mongo:
    image: mongo:7
    ports: [ "27017:27017" ]
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - deepscan-net

  redis:
    image: redis:7-alpine
    ports: [ "6379:6379" ]
    restart: unless-stopped
    networks:
      - deepscan-net

  telegram-bot:
    build: ./telegram-bot
    env_file: .env
    depends_on: [ backend ]
    restart: unless-stopped
    networks:
      - deepscan-net

networks:
  deepscan-net:
    driver: bridge

volumes:
  mongo_data: {}
